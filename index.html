<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AudiosWhats — Os melhores áudios engraçados do Brasil</title>
<meta name="description" content="Os melhores áudios engraçados para mandar no WhatsApp. Ouça, baixe e compartilhe grátis!">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --green:#0d6e5e;
  --green-light:#1a8a77;
  --green-bg:#e8f5f2;
  --badge-new:#e8a020;
  --bg:#f2f4f3;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:#111;min-height:100vh}

/* HEADER */
.header{background:var(--green);height:52px;padding:0 16px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.header-title{color:#fff;font-size:20px;font-weight:700;flex:1}

/* STICKY CONTROLS (tabs + search) */
.controls{background:#fff;position:sticky;top:52px;z-index:90;border-bottom:1px solid #e0e0e0;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.tabs-wrap{display:flex;overflow-x:auto;gap:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 12px}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab-item{padding:11px 16px;font-size:13px;font-weight:500;color:#888;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;flex-shrink:0;transition:color 0.15s}
.tab-item.active{color:var(--green);border-bottom-color:var(--green)}
.tab-item:hover{color:var(--green)}
.search-wrap{padding:8px 12px 10px}
.search-bar{background:#f5f5f5;border:1.5px solid #e8e8e8;border-radius:20px;display:flex;align-items:center;padding:0 14px;gap:8px;transition:border-color 0.15s}
.search-bar:focus-within{border-color:var(--green);background:#fff}
.search-bar i{font-size:16px;color:#bbb;flex-shrink:0}
.search-input{flex:1;border:none;outline:none;padding:9px 0;font-size:14px;color:#333;background:transparent}
.search-input::placeholder{color:#bbb}

/* AD BANNER */
.ad-banner{background:#fff;padding:8px 0;text-align:center;border-bottom:1px solid #e8e8e8}
.ad-label{font-size:9px;color:#ccc;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px}
.ad-slot{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#f9f9f9;border:1px dashed #e0e0e0;border-radius:6px;width:728px;max-width:95%;height:90px;color:#ccc;font-size:12px}

/* MAIN */
.main{padding:14px 12px 30px;max-width:900px;margin:0 auto}

/* SECTION */
.section{margin-bottom:22px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:16px;font-weight:700;color:var(--green)}
.section-link{font-size:13px;color:var(--green);font-weight:500;cursor:pointer;background:none;border:none}
.section-link:hover{opacity:0.75}

/* HORIZONTAL SCROLL */
.h-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.h-scroll::-webkit-scrollbar{display:none}

/* CARD */
.card{background:#fff;border-radius:var(--radius);overflow:hidden;border:1px solid #e2e8e6;box-shadow:0 1px 4px rgba(0,0,0,0.07);flex-shrink:0;width:155px;transition:box-shadow 0.2s,border-color 0.2s}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,0.11)}
.card.playing{border-color:var(--green);box-shadow:0 4px 14px rgba(13,110,94,0.18)}
.card-img-wrap{position:relative;width:100%;height:140px;overflow:hidden;background:#eee;cursor:pointer}
.card-img{width:100%;height:100%;object-fit:cover;display:block}
.card-img-fallback{width:100%;height:100%;background:linear-gradient(135deg,var(--green),var(--green-light));display:none;align-items:center;justify-content:center;font-size:40px}
.badge-new{position:absolute;top:6px;left:6px;background:var(--badge-new);color:#fff;font-size:9px;font-weight:800;padding:3px 7px;border-radius:6px;letter-spacing:0.04em}
.badge-adult{position:absolute;top:6px;right:6px;background:#c0392b;color:#fff;font-size:9px;font-weight:800;padding:3px 6px;border-radius:6px}
.card-title{font-size:12px;font-weight:600;color:#222;line-height:1.4;padding:8px 8px 0;min-height:38px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-align:center;cursor:pointer}
.card-actions{display:flex;align-items:center;justify-content:center;gap:7px;padding:8px}
.cbtn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s;flex-shrink:0}
.cbtn:active{transform:scale(0.9)}
.cbtn i{font-size:15px}
.cbtn-play{background:var(--green)}
.cbtn-play i{color:#fff}
.cbtn-whats{background:#25D366}
.cbtn-whats i{color:#fff}
.cbtn-fav{background:#efefef}
.cbtn-fav i{color:#aaa}
.cbtn-fav.on{background:#fff0f0}
.cbtn-fav.on i{color:#e24b4a}
.card-progress{height:3px;background:#eee;display:none}
.card-progress-fill{height:100%;background:var(--green);width:0%;transition:width 0.1s linear}
.card.playing .card-progress{display:block}

/* GRID (all view) */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.grid .card{width:100%}
.grid .card-img-wrap{height:160px}

/* AD INLINE */
.ad-inline{background:#fff;border:1px dashed #ddd;border-radius:10px;padding:14px;text-align:center;color:#ccc;font-size:12px;display:flex;align-items:center;justify-content:center;gap:8px;min-height:70px;grid-column:1/-1;margin:4px 0}

/* APP BAR */
.app-bar{background:var(--green-bg);border:1.5px solid #b2d8d0;border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.app-bar-text{flex:1}
.app-bar-text strong{font-size:13px;color:var(--green);display:block;margin-bottom:2px}
.app-bar-text span{font-size:11px;color:#555}
.store-btns{display:flex;gap:6px;flex-wrap:wrap}
.store-btn{padding:7px 12px;border-radius:8px;border:1.5px solid var(--green);font-size:11px;font-weight:700;cursor:pointer;background:#fff;color:var(--green);display:flex;align-items:center;gap:5px;white-space:nowrap;text-decoration:none;transition:all 0.15s}
.store-btn:hover{background:var(--green);color:#fff}

/* DETAIL */
.page-detail{display:none;max-width:600px;margin:0 auto;padding:14px 12px 40px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--green);cursor:pointer;margin-bottom:14px;font-weight:600;background:none;border:none;padding:4px 0}
.detail-card{background:#fff;border-radius:var(--radius);overflow:hidden;border:1px solid #e2e8e6;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.detail-img{width:100%;height:260px;object-fit:cover;display:block}
.detail-img-fallback{width:100%;height:260px;background:linear-gradient(135deg,var(--green),var(--green-light));display:none;align-items:center;justify-content:center;font-size:80px}
.detail-body{padding:16px}
.detail-badges{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.detail-title{font-size:18px;font-weight:700;color:#111;line-height:1.3;margin-bottom:4px}
.detail-meta{font-size:12px;color:#999;margin-bottom:16px}
.detail-progress{width:100%;height:5px;background:#eee;border-radius:3px;overflow:hidden;margin-bottom:16px;display:none}
.detail-progress-fill{height:100%;background:var(--green);width:0%;transition:width 0.1s linear}
.detail-play-btn{width:100%;padding:14px;border-radius:10px;background:var(--green);border:none;cursor:pointer;font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;transition:background 0.15s}
.detail-play-btn:hover{background:var(--green-light)}
.detail-play-btn.stop{background:#e24b4a}
.detail-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.action-btn{padding:11px;border-radius:10px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#333;display:flex;align-items:center;justify-content:center;gap:7px;transition:all 0.15s}
.action-btn:hover{border-color:var(--green);color:var(--green)}
.action-btn.fav-on{border-color:#e24b4a;color:#e24b4a;background:#fff5f5}
.detail-ad{background:#f9f9f9;border:1px dashed #ddd;border-radius:10px;padding:18px;text-align:center;color:#ccc;font-size:12px;display:flex;align-items:center;justify-content:center;gap:8px}

/* NOW PLAYING */
.np-bar{position:fixed;bottom:0;left:0;right:0;background:var(--green);padding:10px 16px;display:none;align-items:center;gap:12px;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,0.15)}
.np-bar.on{display:flex}
.np-dot{width:8px;height:8px;background:#fff;border-radius:50%;flex-shrink:0;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.np-info{flex:1;min-width:0}
.np-label{font-size:10px;color:rgba(255,255,255,0.7);font-weight:600;text-transform:uppercase}
.np-title{font-size:13px;color:#fff;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.np-stop{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
.np-stop:hover{background:rgba(255,255,255,0.3)}

/* EMPTY / LOADING */
.empty{padding:40px;text-align:center;color:#bbb;grid-column:1/-1}
.empty i{font-size:48px;display:block;margin-bottom:12px}
.loading{padding:60px;text-align:center;color:#aaa}
.loading i{font-size:36px;display:block;margin-bottom:12px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:999;pointer-events:none;transition:opacity 0.4s}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <span class="header-title">AudiosWhats</span>
</div>

<!-- STICKY CONTROLS -->
<div class="controls">
  <div class="tabs-wrap">
    <div class="tab-item active" id="tab-inicio" onclick="goTab('inicio',this)">Início</div>
    <div class="tab-item" id="tab-novos" onclick="goTab('novos',this)">🔥 Novos</div>
    <div class="tab-item" id="tab-todos" onclick="goTab('todos',this)">Todos</div>
    <div class="tab-item" id="tab-favs" onclick="goTab('favs',this)">❤️ Favoritos</div>
  </div>
  <div class="search-wrap">
    <div class="search-bar">
      <i class="ti ti-search"></i>
      <input class="search-input" type="text" placeholder="Buscar áudios..." oninput="onSearch(this.value)" id="search-input">
    </div>
  </div>
</div>

<!-- AD BANNER -->
<div class="ad-banner">
  <div class="ad-label">Publicidade</div>
  <div class="ad-slot"><i class="ti ti-ad" style="font-size:18px"></i> Google AdSense — 728×90</div>
</div>

<!-- HOME VIEW -->
<div id="view-home">
  <div class="main" id="home-content">
    <div class="loading"><i class="ti ti-loader-2"></i>Carregando áudios...</div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="view-detail" style="display:none">
  <div class="page-detail">
    <button class="back-btn" onclick="showHome()"><i class="ti ti-arrow-left" style="font-size:16px"></i> Voltar</button>
    <div class="detail-ad" style="margin-bottom:14px"><i class="ti ti-ad"></i> Anúncio — Google AdSense</div>
    <div class="detail-card">
      <img class="detail-img" id="detail-img" src="" alt="" onerror="this.style.display='none';document.getElementById('detail-img-fb').style.display='flex'">
      <div class="detail-img-fallback" id="detail-img-fb">🎵</div>
      <div class="detail-body">
        <div class="detail-badges" id="detail-badges"></div>
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-meta" id="detail-meta"></div>
        <div class="detail-progress" id="detail-progress"><div class="detail-progress-fill" id="detail-pf"></div></div>
        <button class="detail-play-btn" id="detail-play-btn" onclick="toggleDetailPlay()">
          <i class="ti ti-player-play" id="detail-play-icon"></i>
          <span id="detail-play-label">Tocar áudio</span>
        </button>
        <div class="detail-actions">
          <button class="action-btn" id="detail-fav-btn" onclick="toggleDetailFav()">
            <i class="ti ti-heart" id="detail-fav-icon"></i> <span id="detail-fav-label">Favoritar</span>
          </button>
          <button class="action-btn" onclick="shareWhatsDetail()"><i class="ti ti-brand-whatsapp" style="color:#25D366"></i> WhatsApp</button>
          <button class="action-btn" onclick="downloadDetail()"><i class="ti ti-download"></i> Baixar MP3</button>
          <button class="action-btn" onclick="copyDetail()"><i class="ti ti-copy"></i> Copiar link</button>
        </div>
      </div>
    </div>
    <div class="detail-ad" style="margin-top:14px"><i class="ti ti-ad"></i> Anúncio — Google AdSense</div>
  </div>
</div>

<!-- NOW PLAYING BAR -->
<div class="np-bar" id="np-bar">
  <div class="np-dot"></div>
  <div class="np-info">
    <div class="np-label">Tocando agora</div>
    <div class="np-title" id="np-title">—</div>
  </div>
  <button class="np-stop" onclick="stopAudio()" title="Parar"><i class="ti ti-player-stop"></i></button>
</div>

<script>
const FIREBASE_URL = 'https://audioswhats-da1f3.firebaseio.com/audios.json';
let allAudios = [];
let currentAudio = null;
let currentIndex = -1;
let progressInterval = null;
let currentTab = 'inicio';
let searchQuery = '';
let detailIndex = -1;

function getFavs(){try{return JSON.parse(localStorage.getItem('aw_favs')||'[]')}catch{return[]}}
function saveFavs(f){try{localStorage.setItem('aw_favs',JSON.stringify(f))}catch{}}

// ===== LOAD =====
async function loadAudios(){
  try{
    const res = await fetch(FIREBASE_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const raw = Array.isArray(data) ? data : Object.values(data);
    allAudios = raw.filter(a => a && typeof a === 'object' && a.audio);
    renderContent();
  }catch(e){
    document.getElementById('home-content').innerHTML=`<div class="empty"><i class="ti ti-wifi-off"></i>Erro ao carregar.<br><small>${e.message}</small></div>`;
  }
}

// ===== CARD =====
function cardHTML(a, idx){
  const favs = getFavs();
  const isFav = favs.includes(idx);
  const isPlay = currentIndex === idx;
  return `<div class="card${isPlay?' playing':''}" id="card-${idx}">
    <div class="card-img-wrap" onclick="openDetail(${idx})">
      <img class="card-img" src="${a.imagem||''}" alt="${a.frase||''}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="card-img-fallback">🎵</div>
      ${a.isNovo?'<div class="badge-new">NEW</div>':''}
      ${a.isAdultOnly?'<div class="badge-adult">+18</div>':''}
    </div>
    <div class="card-progress" id="cpb-${idx}"><div class="card-progress-fill" id="cpf-${idx}"></div></div>
    <div class="card-title" onclick="openDetail(${idx})">${a.frase||a.pathAudio}</div>
    <div class="card-actions">
      <button class="cbtn cbtn-play" id="playbtn-${idx}" onclick="togglePlay(${idx})" title="Tocar">
        <i class="ti ${isPlay?'ti-player-stop':'ti-player-play'}" id="playicon-${idx}"></i>
      </button>
      <button class="cbtn cbtn-whats" onclick="shareWhats(${idx})" title="Compartilhar no WhatsApp">
        <i class="ti ti-brand-whatsapp"></i>
      </button>
      <button class="cbtn cbtn-fav${isFav?' on':''}" id="favbtn-${idx}" onclick="toggleFav(${idx})" title="Favoritar">
        <i class="ti ${isFav?'ti-star-filled':'ti-star'}"></i>
      </button>
    </div>
  </div>`;
}

// ===== RENDER =====
function getFiltered(){
  let list = allAudios.filter(a => !a.isAdultOnly);
  if(currentTab === 'novos') list = list.filter(a => a.isNovo);
  else if(currentTab === 'favs'){const f=getFavs(); list = allAudios.filter((_,i)=>f.includes(i));}
  if(searchQuery){const q=searchQuery.toLowerCase(); list=list.filter(a=>a.frase&&a.frase.toLowerCase().includes(q));}
  return list;
}

function renderContent(){
  if(currentTab === 'inicio' && !searchQuery){
    renderHome();
  } else {
    renderGrid();
  }
}

function renderHome(){
  const novos = allAudios.filter(a=>!a.isAdultOnly&&a.isNovo).slice(0,12);
  const todos = allAudios.filter(a=>!a.isAdultOnly).slice(0,12);
  const favIdxs = getFavs();
  const favs = allAudios.filter((_,i)=>favIdxs.includes(i)).slice(0,12);

  let html = `<div class="app-bar">
    <i class="ti ti-device-mobile-vibration" style="font-size:30px;color:var(--green)"></i>
    <div class="app-bar-text">
      <strong>Baixe o app gratuito!</strong>
      <span>+2000 áudios engraçados direto no seu celular</span>
    </div>
    <div class="store-btns">
      <a class="store-btn" href="https://apps.apple.com/app/id1475964208" target="_blank" rel="noopener">
        <i class="ti ti-brand-apple" style="font-size:13px"></i> App Store
      </a>
      <a class="store-btn" href="https://play.google.com/store/apps/details?id=audiowhats.maskow.org.audiowhats" target="_blank" rel="noopener">
        <i class="ti ti-brand-google-play" style="font-size:13px"></i> Google Play
      </a>
      <a class="store-btn" href="https://chat.whatsapp.com/IN5LTTgbHJv5U1OYNsgMsR?s=cl&p=i&ilr=2&amv=2" target="_blank" rel="noopener">
        <i class="ti ti-brand-whatsapp" style="font-size:13px"></i> Grupo do WhatsApp
      </a>
    </div>
  </div>`;

  if(novos.length){
    html += `<div class="section">
      <div class="section-header">
        <span class="section-title">🔥 Novos Áudios</span>
        <button class="section-link" onclick="goTab('novos',document.getElementById('tab-novos'))">Ver mais</button>
      </div>
      <div class="h-scroll">${novos.map(a=>cardHTML(a,allAudios.indexOf(a))).join('')}</div>
    </div>`;
  }

  html += `<div class="section">
    <div class="section-header">
      <span class="section-title">Todos Áudios</span>
      <button class="section-link" onclick="goTab('todos',document.getElementById('tab-todos'))">Ver mais</button>
    </div>
    <div class="h-scroll">${todos.map(a=>cardHTML(a,allAudios.indexOf(a))).join('')}</div>
  </div>`;

  html += `<div style="background:#fff;border:1px dashed #ddd;border-radius:10px;padding:14px;text-align:center;color:#ccc;font-size:12px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;min-height:70px">
    <i class="ti ti-ad" style="font-size:18px"></i> Anúncio Google AdSense
  </div>`;

  if(favs.length){
    html += `<div class="section">
      <div class="section-header">
        <span class="section-title">❤️ Meus Favoritos</span>
        <button class="section-link" onclick="goTab('favs',document.getElementById('tab-favs'))">Ver mais</button>
      </div>
      <div class="h-scroll">${favs.map(a=>cardHTML(a,allAudios.indexOf(a))).join('')}</div>
    </div>`;
  }

  document.getElementById('home-content').innerHTML = html;
}

function renderGrid(){
  const filtered = getFiltered();
  const favTab = document.getElementById('tab-favs');
  if(favTab) favTab.textContent = '❤️ Favoritos'+(getFavs().length?` (${getFavs().length})`:'');

  if(!filtered.length){
    document.getElementById('home-content').innerHTML='<div class="empty"><i class="ti ti-mood-sad"></i>Nenhum áudio encontrado</div>';
    return;
  }
  let html = '<div class="grid">';
  filtered.forEach((a,li)=>{
    const idx = allAudios.indexOf(a);
    if(li>0 && li%12===0){
      html += `</div><div style="background:#fff;border:1px dashed #ddd;border-radius:10px;padding:14px;text-align:center;color:#ccc;font-size:12px;margin:8px 0;display:flex;align-items:center;justify-content:center;gap:8px;min-height:70px"><i class="ti ti-ad" style="font-size:18px"></i> Anúncio Google AdSense</div><div class="grid">`;
    }
    html += cardHTML(a, idx);
  });
  html += '</div>';
  document.getElementById('home-content').innerHTML = html;
}

// ===== PLAY =====
function togglePlay(idx){
  if(currentIndex===idx){stopAudio();return;}
  if(currentAudio)stopAudio();
  currentIndex=idx;
  currentAudio=new Audio(allAudios[idx].audio);
  currentAudio.play().catch(()=>{});
  updateCardUI(idx,true);
  document.getElementById('np-title').textContent=allAudios[idx].frase;
  document.getElementById('np-bar').classList.add('on');
  progressInterval=setInterval(()=>{
    if(!currentAudio||!currentAudio.duration)return;
    const pct=(currentAudio.currentTime/currentAudio.duration)*100;
    const pf=document.getElementById('cpf-'+idx);
    if(pf)pf.style.width=pct+'%';
    if(detailIndex===idx){const dpf=document.getElementById('detail-pf');if(dpf)dpf.style.width=pct+'%';}
  },150);
  currentAudio.onended=()=>stopAudio();
}

function stopAudio(){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  clearInterval(progressInterval);
  if(currentIndex>=0){
    updateCardUI(currentIndex,false);
    const pf=document.getElementById('cpf-'+currentIndex);if(pf)pf.style.width='0%';
    if(detailIndex===currentIndex)resetDetailPlay();
  }
  currentIndex=-1;
  document.getElementById('np-bar').classList.remove('on');
}

function updateCardUI(idx,playing){
  const card=document.getElementById('card-'+idx);
  const icon=document.getElementById('playicon-'+idx);
  if(card)card.classList.toggle('playing',playing);
  if(icon)icon.className='ti '+(playing?'ti-player-stop':'ti-player-play');
  if(detailIndex===idx){
    document.getElementById('detail-play-btn').className='detail-play-btn'+(playing?' stop':'');
    document.getElementById('detail-play-icon').className='ti '+(playing?'ti-player-stop':'ti-player-play');
    document.getElementById('detail-play-label').textContent=playing?'Parar':'Tocar áudio';
    document.getElementById('detail-progress').style.display=playing?'block':'none';
  }
}

function resetDetailPlay(){
  document.getElementById('detail-play-btn').className='detail-play-btn';
  document.getElementById('detail-play-icon').className='ti ti-player-play';
  document.getElementById('detail-play-label').textContent='Tocar áudio';
  document.getElementById('detail-progress').style.display='none';
  document.getElementById('detail-pf').style.width='0%';
}

// ===== FAV =====
function toggleFav(idx){
  const favs=getFavs();
  const i=favs.indexOf(idx);
  if(i>-1)favs.splice(i,1);else favs.push(idx);
  saveFavs(favs);
  const btn=document.getElementById('favbtn-'+idx);
  const isFav=favs.includes(idx);
  if(btn){btn.className='cbtn cbtn-fav'+(isFav?' on':'');btn.querySelector('i').className='ti '+(isFav?'ti-star-filled':'ti-star');}
  if(detailIndex===idx)renderDetailFav();
}

// ===== SHARE =====
function shareWhats(idx){
  const a=allAudios[idx];
  window.open('https://wa.me/?text='+encodeURIComponent(a.frase+'\n'+a.audio),'_blank');
}
function shareWhatsDetail(){shareWhats(detailIndex);}
function copyDetail(){navigator.clipboard.writeText(allAudios[detailIndex].audio).then(()=>showToast('Link copiado!')).catch(()=>{});}
function downloadDetail(){
  const a=allAudios[detailIndex];
  const link=document.createElement('a');link.href=a.audio;link.download=(a.pathAudio||'audio')+'.mp3';link.target='_blank';link.click();
}

function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity=0;setTimeout(()=>t.remove(),400)},2000);
}

// ===== SEARCH =====
function onSearch(val){
  searchQuery=val.trim();
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  renderContent();
}

// ===== TABS =====
function goTab(tab, el){
  currentTab=tab;
  searchQuery='';
  document.getElementById('search-input').value='';
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  renderContent();
  window.scrollTo(0,0);
}

// ===== VIEWS =====
function showHome(){
  document.getElementById('view-home').style.display='block';
  document.getElementById('view-detail').style.display='none';
  document.getElementById('controls') && null;
  document.querySelector('.controls').style.display='block';
  renderContent();
  window.scrollTo(0,0);
}

function openDetail(idx){
  detailIndex=idx;
  const a=allAudios[idx];
  if(currentIndex>=0&&currentIndex!==idx)stopAudio();
  const img=document.getElementById('detail-img');
  img.src=a.imagem||'';img.style.display='block';
  document.getElementById('detail-img-fb').style.display='none';
  document.getElementById('detail-title').textContent=a.frase||a.pathAudio;
  document.getElementById('detail-meta').textContent=a.personagem?'Personagem: '+a.personagem:'Áudios engraçados para WhatsApp';
  const b=(a.isNovo?'<span style="background:var(--badge-new);color:#fff;font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700">NEW</span>':'')+
          (a.isAdultOnly?'<span style="background:#c0392b;color:#fff;font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;margin-left:4px">+18</span>':'');
  document.getElementById('detail-badges').innerHTML=b;
  const isPlay=currentIndex===idx;
  document.getElementById('detail-play-btn').className='detail-play-btn'+(isPlay?' stop':'');
  document.getElementById('detail-play-icon').className='ti '+(isPlay?'ti-player-stop':'ti-player-play');
  document.getElementById('detail-play-label').textContent=isPlay?'Parar':'Tocar áudio';
  document.getElementById('detail-progress').style.display=isPlay?'block':'none';
  renderDetailFav();
  document.getElementById('view-home').style.display='none';
  document.getElementById('view-detail').style.display='block';
  window.scrollTo(0,0);
}

function renderDetailFav(){
  const isFav=getFavs().includes(detailIndex);
  document.getElementById('detail-fav-btn').className='action-btn'+(isFav?' fav-on':'');
  document.getElementById('detail-fav-icon').className='ti '+(isFav?'ti-heart-filled':'ti-heart');
  document.getElementById('detail-fav-label').textContent=isFav?'Favoritado':'Favoritar';
}

function toggleDetailPlay(){togglePlay(detailIndex);}
function toggleDetailFav(){toggleFav(detailIndex);}

loadAudios();
</script>
</body>
</html>
